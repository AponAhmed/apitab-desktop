<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- connect-src covers apiClient.ts's direct fetch() calls to the team-sync
         backend (config/server.ts's API_BASE_URL) — 'self' alone (the
         default-src fallback) blocks cross-origin fetch entirely. Actual API
         testing requests don't need this: those go through window.api.request.send
         to the main process, which has no CSP. -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; connect-src 'self' https: http://127.0.0.1:* http://localhost:*;"
    />
    <title>ApiTab</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
