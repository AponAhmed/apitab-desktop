appId: com.apitab.desktop
productName: ApiTab
directories:
  buildResources: build
  output: dist
# Consistent filenames across platforms (mac/linux targets otherwise
# default to inconsistent templates — some use productName, some use name).
artifactName: ${name}-${version}.${ext}
files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}'
  - '!{.env,.env.*,.npmrc,pnpm-lock.yaml,package-lock.json,yarn.lock}'
  - '!{README.md,CHANGELOG.md}'
asarUnpack:
  - resources/**
# Lets electron-updater (main/autoUpdate.ts) know where to check for new
# releases. Public repo, so no token is needed at update-check time; CI still
# publishes releases itself via softprops/action-gh-release (see build.yml).
publish:
  provider: github
  owner: AponAhmed
  repo: apitab-desktop
win:
  executableName: apitab-desktop
  target:
    - target: nsis
      arch: [x64]
  # No local signing config here — this build is unsigned. The Windows
  # installer is instead signed as a separate post-build CI step (see
  # build.yml) via SignPath Foundation's free open-source code signing
  # program: https://signpath.org. It signs the already-built artifact
  # remotely rather than plugging into electron-builder's own signtool.exe
  # invocation, so there's nothing to configure on this side.
nsis:
  artifactName: ${name}-${version}-setup.${ext}
  shortcutName: ${productName}
  uninstallDisplayName: ${productName}
  createDesktopShortcut: always
mac:
  entitlementsInherit: build/entitlements.mac.plist
  target:
    - target: dmg
      arch: [x64, arm64]
  notarize: false
linux:
  target:
    - target: AppImage
      arch: [x64]
    - target: tar.gz
      arch: [x64]
    - target: deb
      arch: [x64]
    - target: rpm
      arch: [x64]
  category: Development
  # electron-builder requires this for deb/rpm; falls back to package.json's
  # author otherwise, but that's "Name (parenthetical)" — not a valid
  # maintainer string, so dpkg-deb / rpmbuild would reject it.
  maintainer: Muhiminul Haque <apon2041@gmail.com>
npmRebuild: false
