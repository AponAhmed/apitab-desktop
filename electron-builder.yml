appId: com.apitab.desktop
productName: ApiTab
directories:
  buildResources: build
  output: dist
# Consistent filenames across platforms (mac/linux targets otherwise
# default to inconsistent templates — some use productName, some use name).
artifactName: ${name}-${version}.${ext}
files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}'
  - '!{.env,.env.*,.npmrc,pnpm-lock.yaml,package-lock.json,yarn.lock}'
  - '!{README.md,CHANGELOG.md}'
asarUnpack:
  - resources/**
# Disables electron-builder's own implicit publish-on-tag behavior, which
# needs its own GH_TOKEN and would otherwise try to create 3 separate
# releases (one per matrix job) competing with the workflow's single
# unified release job (softprops/action-gh-release).
publish: never
win:
  executableName: apitab-desktop
  target:
    - target: nsis
      arch: [x64]
nsis:
  artifactName: ${name}-${version}-setup.${ext}
  shortcutName: ${productName}
  uninstallDisplayName: ${productName}
  createDesktopShortcut: always
mac:
  entitlementsInherit: build/entitlements.mac.plist
  target:
    - target: dmg
      arch: [x64, arm64]
  notarize: false
linux:
  target:
    - target: AppImage
      arch: [x64]
    - target: tar.gz
      arch: [x64]
  category: Development
npmRebuild: false
