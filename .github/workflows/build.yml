name: Build desktop app

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: {}

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            script: dist:win
          - os: macos-latest
            script: dist:mac
          - os: ubuntu-latest
            script: dist:linux
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm ci

      # rpmbuild isn't preinstalled on ubuntu-latest — electron-builder's rpm
      # target shells out to it and fails outright without this.
      - if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y rpm

      # Windows code signing (scripts/windows-sign.mjs, SSL.com CodeSignTool
      # — see that file for why not a .pfx/CSC_LINK). ES_USERNAME unset is
      # the no-signing-configured case: the sign hook no-ops and the build
      # stays unsigned exactly as before. TODO once an SSL.com account
      # exists: add a step here that provisions CodeSignTool onto the
      # windows-latest runner and sets CODESIGNTOOL_PATH — deliberately not
      # added yet, since SSL.com's public download page is an HTML landing
      # page, not a stable versioned URL safe to curl in CI; get the actual
      # download link from the account portal first.
      - run: npm run ${{ matrix.script }}
        env:
          # Stops electron-builder from searching the runner's keychain for
          # a macOS code-signing certificate and failing outright when it
          # finds none — falls back to an unsigned build instead.
          CSC_IDENTITY_AUTO_DISCOVERY: false
          ES_USERNAME: ${{ secrets.ES_USERNAME }}
          ES_PASSWORD: ${{ secrets.ES_PASSWORD }}
          ES_CREDENTIAL_ID: ${{ secrets.ES_CREDENTIAL_ID }}
          ES_TOTP_SECRET: ${{ secrets.ES_TOTP_SECRET }}
          CODESIGNTOOL_PATH: ${{ vars.CODESIGNTOOL_PATH }}

      # Unsigned builds: Windows shows an "unknown publisher" SmartScreen
      # warning and macOS needs a right-click-Open to bypass Gatekeeper,
      # until a code-signing certificate is added to this workflow.
      # dist/latest*.yml (latest.yml / latest-mac.yml / latest-linux.yml) and
      # *.blockmap are the electron-updater update-feed metadata — without
      # them the in-app self-update check (main/autoUpdate.ts) can't find
      # or verify new releases. Deliberately NOT dist/*.yml: that also
      # matches electron-builder's own builder-debug.yml, which every matrix
      # job produces with the same filename — all three colliding on the
      # same release asset name breaks the release step (seen in v0.7.0).
      - uses: actions/upload-artifact@v4
        with:
          name: apitab-desktop-${{ matrix.os }}
          path: |
            dist/*.exe
            dist/*.dmg
            dist/*.tar.gz
            dist/*.AppImage
            dist/*.deb
            dist/*.rpm
            dist/latest*.yml
            dist/*.blockmap
          if-no-files-found: ignore

  # Installers are too large for git (GitHub's 100MB per-file limit), so
  # tagged builds publish here instead — apitab-server's landing page links
  # directly to these release asset URLs.
  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
