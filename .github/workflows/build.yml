name: Build desktop app

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: {}

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            script: dist:win
          - os: macos-latest
            script: dist:mac
          - os: ubuntu-latest
            script: dist:linux
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm ci

      - run: npm run ${{ matrix.script }}

      # Unsigned builds: Windows shows an "unknown publisher" SmartScreen
      # warning and macOS needs a right-click-Open to bypass Gatekeeper,
      # until a code-signing certificate is added to this workflow.
      - uses: actions/upload-artifact@v4
        with:
          name: apitab-desktop-${{ matrix.os }}
          path: |
            dist/*.exe
            dist/*.dmg
            dist/*.tar.gz
            dist/*.AppImage
          if-no-files-found: ignore

  # Installers are too large for git (GitHub's 100MB per-file limit), so
  # tagged builds publish here instead — apitab-server's landing page links
  # directly to these release asset URLs.
  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
