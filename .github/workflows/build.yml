name: Build desktop app

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: {}

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            script: dist:win
          - os: macos-latest
            script: dist:mac
          - os: ubuntu-latest
            script: dist:linux
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm ci

      # rpmbuild isn't preinstalled on ubuntu-latest — electron-builder's rpm
      # target shells out to it and fails outright without this.
      - if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y rpm

      # Without this, electron-builder searches the runner's keychain for a
      # code-signing certificate on macOS and fails outright when it finds
      # none, instead of falling back to an unsigned build.
      - run: npm run ${{ matrix.script }}
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      # Windows code signing: no local cert of any kind (no public CA issues
      # exportable .pfx certs anymore, and every paid cloud-signing option
      # is out of scope here) — instead, the built installer is submitted to
      # SignPath Foundation's free code-signing program for open-source
      # projects (https://signpath.org, apply there first) as a separate
      # post-build step. Inert without SIGNPATH_API_TOKEN, so this is a
      # no-op — and every other matrix job — until that secret plus the
      # three IDs below are actually filled in from the SignPath dashboard
      # once the project is approved.
      #
      # Known limitations of this step as written: it only signs the outer
      # NSIS installer exe (the artifact a user actually downloads and hits
      # the Smart App Control block on) — the app exe extracted during
      # install stays unsigned unless a second artifact is added to the
      # SignPath project's artifact configuration. It also doesn't
      # regenerate apitab-desktop-*.exe.blockmap after signing changes the
      # file's bytes, so electron-updater's delta-update check for this
      # release will fall back to a full download instead of a diff patch —
      # not broken, just less efficient.
      - name: Upload unsigned installer for signing
        id: upload-unsigned-installer
        # `secrets` can't be referenced directly in `if:` (GitHub Actions
        # rejects the whole workflow file at validation time for it —
        # "Unrecognized named-value: 'secrets'"); env.SIGNPATH_API_TOKEN,
        # set on this step below, is the supported way to do this check.
        if: matrix.os == 'windows-latest' && env.SIGNPATH_API_TOKEN != ''
        env:
          SIGNPATH_API_TOKEN: ${{ secrets.SIGNPATH_API_TOKEN }}
        uses: actions/upload-artifact@v4
        with:
          name: unsigned-installer
          path: dist/*-setup.exe
          retention-days: 1

      - name: Sign installer via SignPath
        if: matrix.os == 'windows-latest' && env.SIGNPATH_API_TOKEN != ''
        env:
          SIGNPATH_API_TOKEN: ${{ secrets.SIGNPATH_API_TOKEN }}
        uses: signpath/github-action-submit-signing-request@v2
        with:
          api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
          organization-id: ${{ vars.SIGNPATH_ORGANIZATION_ID }}
          project-slug: ${{ vars.SIGNPATH_PROJECT_SLUG }}
          signing-policy-slug: ${{ vars.SIGNPATH_SIGNING_POLICY_SLUG }}
          github-artifact-id: ${{ steps.upload-unsigned-installer.outputs.artifact-id }}
          wait-for-completion: true
          # Unverified against a real SignPath project (no account exists to
          # test against): confirm at https://docs.signpath.io whether this
          # lands the signed .exe directly in dist/ or inside a nested zip
          # that needs an extra extraction step before the upload-artifact
          # step below picks it up.
          output-artifact-directory: dist

      # Unsigned builds: Windows shows an "unknown publisher" SmartScreen
      # warning and macOS needs a right-click-Open to bypass Gatekeeper,
      # until a code-signing certificate is added to this workflow.
      # dist/latest*.yml (latest.yml / latest-mac.yml / latest-linux.yml) and
      # *.blockmap are the electron-updater update-feed metadata — without
      # them the in-app self-update check (main/autoUpdate.ts) can't find
      # or verify new releases. Deliberately NOT dist/*.yml: that also
      # matches electron-builder's own builder-debug.yml, which every matrix
      # job produces with the same filename — all three colliding on the
      # same release asset name breaks the release step (seen in v0.7.0).
      - uses: actions/upload-artifact@v4
        with:
          name: apitab-desktop-${{ matrix.os }}
          path: |
            dist/*.exe
            dist/*.dmg
            dist/*.tar.gz
            dist/*.AppImage
            dist/*.deb
            dist/*.rpm
            dist/latest*.yml
            dist/*.blockmap
          if-no-files-found: ignore

  # Installers are too large for git (GitHub's 100MB per-file limit), so
  # tagged builds publish here instead — apitab-server's landing page links
  # directly to these release asset URLs.
  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
